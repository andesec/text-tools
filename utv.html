<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTV - URI & Base64 Utility</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #020617;
            --panel-dark: rgba(30, 41, 59, 0.4);
        }

        body {
            background-color: var(--bg-dark);
            color: #f1f5f9;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glass {
            background: var(--panel-dark);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
        }

        textarea {
            background: rgba(15, 23, 42, 0.6) !important;
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
            color: #e2e8f0 !important;
            resize: none;
            transition: all 0.2s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        .action-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .copy-toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .copy-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(-0.5rem);
        }
    </style>
</head>

<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto space-y-8">
        <!-- Header -->
        <header class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="index.html"
                    class="p-2 hover:bg-slate-800 rounded-xl transition-colors text-slate-400 hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                </a>
                <div
                    class="bg-gradient-to-br from-indigo-500 to-purple-600 p-2 rounded-xl shadow-lg shadow-indigo-500/20">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold tracking-tight">UTV Utility</h1>
            </div>
            <div class="text-slate-500 text-sm font-medium">URI & Base64 Transformer</div>
        </header>

        <!-- Main Content -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 relative">
            <!-- Input Panel -->
            <section class="glass p-6 space-y-4">
                <div class="flex items-center justify-between">
                    <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-400">Input</h2>
                    <button onclick="clearText('input')"
                        class="text-xs text-slate-500 hover:text-red-400 transition-colors">Clear</button>
                </div>
                <textarea id="input" class="w-full h-80 p-4 rounded-xl font-mono text-sm leading-relaxed"
                    placeholder="Paste your text here..."></textarea>
            </section>

            <!-- Action Column (Mobile: Row, Desktop: Vertical Overlay) -->
            <div
                class="flex lg:flex-col items-center justify-center gap-4 lg:absolute lg:inset-y-0 lg:left-1/2 lg:-translate-x-1/2 z-10 py-4 lg:py-0">
                <button onclick="swap()"
                    class="bg-slate-800 hover:bg-slate-700 p-3 rounded-full shadow-xl border border-white/5 transition-all hover:scale-110 active:scale-90"
                    title="Swap Input/Output">
                    <svg class="w-6 h-6 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"></path>
                    </svg>
                </button>
            </div>

            <!-- Output Panel -->
            <section class="glass p-6 space-y-4">
                <div class="flex items-center justify-between">
                    <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-400">Output</h2>
                    <div class="flex gap-4">
                        <button onclick="clearText('output')"
                            class="text-xs text-slate-500 hover:text-red-400 transition-colors">Clear</button>
                        <button onclick="copyOutput()"
                            class="text-xs text-indigo-400 hover:text-indigo-300 transition-colors font-medium">Copy
                            Output</button>
                    </div>
                </div>
                <textarea id="output" class="w-full h-80 p-4 rounded-xl font-mono text-sm leading-relaxed"
                    placeholder="Result will appear here..."></textarea>
            </section>
        </div>

        <!-- Actions Bar -->
        <div class="glass p-6 grid grid-cols-2 md:grid-cols-4 gap-4">
            <button onclick="transform('b64e')"
                class="action-btn bg-gradient-to-r from-indigo-600 to-indigo-700 hover:from-indigo-500 hover:to-indigo-600 p-4 rounded-2xl shadow-lg shadow-indigo-900/20 text-sm font-bold tracking-wide uppercase">
                Base64 Encode
            </button>
            <button onclick="transform('b64d')"
                class="action-btn bg-gradient-to-r from-purple-600 to-purple-700 hover:from-purple-500 hover:to-purple-600 p-4 rounded-2xl shadow-lg shadow-purple-900/20 text-sm font-bold tracking-wide uppercase">
                Base64 Decode
            </button>
            <button onclick="transform('urie')"
                class="action-btn bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-500 hover:to-blue-600 p-4 rounded-2xl shadow-lg shadow-blue-900/20 text-sm font-bold tracking-wide uppercase">
                URI Encode
            </button>
            <button onclick="transform('urid')"
                class="action-btn bg-gradient-to-r from-cyan-600 to-cyan-700 hover:from-cyan-500 hover:to-cyan-600 p-4 rounded-2xl shadow-lg shadow-cyan-900/20 text-sm font-bold tracking-wide uppercase">
                URI Decode
            </button>
            <button onclick="transform('resolve')"
                class="action-btn bg-gradient-to-r from-pink-600 to-pink-700 hover:from-pink-500 hover:to-pink-600 p-4 rounded-2xl shadow-lg shadow-pink-900/20 text-sm font-bold tracking-wide uppercase">
                Resolve Escapes
            </button>
        </div>
    </div>

    <div id="toast" class="copy-toast">Copied to clipboard!</div>

    <script>
        const inputEl = document.getElementById('input');
        const outputEl = document.getElementById('output');
        const toastEl = document.getElementById('toast');

        function transform(type) {
            const text = inputEl.value;
            if (!text) return;

            try {
                let result = '';
                switch (type) {
                    case 'b64e': result = btoa(unescape(encodeURIComponent(text))); break;
                    case 'b64d': result = decodeURIComponent(escape(atob(text))); break;
                    case 'urie': result = encodeURIComponent(text); break;
                    case 'urid': result = decodeURIComponent(text); break;
                    case 'resolve':
                        result = text.replace(/\\n/g, "\n")
                            .replace(/\\r/g, "\r")
                            .replace(/\\t/g, "\t")
                            .replace(/\\"/g, '"')
                            .replace(/\\u([0-9a-fA-F]{4})/g, (match, grp) => {
                                return String.fromCharCode(parseInt(grp, 16));
                            });
                        break;
                }
                outputEl.value = result;
                showToast('Transformation successful!');
            } catch (e) {
                alert('Operation failed: ' + e.message);
            }
        }

        function swap() {
            const temp = inputEl.value;
            inputEl.value = outputEl.value;
            outputEl.value = temp;
        }

        function clearText(target) {
            document.getElementById(target).value = '';
        }

        function copyOutput() {
            if (!outputEl.value) return;
            navigator.clipboard.writeText(outputEl.value).then(() => {
                showToast('Copied to clipboard!');
            });
        }

        function showToast(msg) {
            toastEl.textContent = msg;
            toastEl.classList.add('show');
            setTimeout(() => toastEl.classList.remove('show'), 2000);
        }
    </script>
</body>

</html>
