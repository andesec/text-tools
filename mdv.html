<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
	<title>Markdown Explorer</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
		rel="stylesheet">
	<script src="https://cdn.tailwindcss.com"></script>
	<script>
		tailwind.config = {
			theme: {
				extend: {
					fontFamily: {
						sans: ['Inter', 'sans-serif'],
					},
				}
			}
		}
	</script>
	<script src="vendor/marked.min.js"></script>
	<script src="vendor/purify.min.js"></script>
	<link href="vendor/prism-tomorrow.min.css" rel="stylesheet" />
	<script src="vendor/prism.min.js"></script>
	<script src="vendor/prism-markdown.min.js"></script>
	<script src="vendor/prism-bash.min.js"></script>
	<script src="vendor/prism-javascript.min.js"></script>
	<script src="vendor/prism-python.min.js"></script>

	<style>
		:root {
			--reader-font-size: 1rem;
		}

		@media (max-width: 640px) {
			:root {
				--reader-font-size: 0.875rem;
			}
		}

		/* Robust Typography System */
		.prose {
			max-width: none;
			color: #374151;
			font-size: var(--reader-font-size);
			line-height: 1.7;
			word-wrap: break-word;
		}

		/* Spacing for block elements */
		.prose p,
		.prose ul,
		.prose ol,
		.prose blockquote,
		.prose pre,
		.prose table {
			margin-top: 1.25em;
			margin-bottom: 1.25em;
		}

		/* Headings */
		.prose h1 {
			font-size: 2.5em;
			line-height: 1.2;
			margin-top: 0;
			margin-bottom: 0.8em;
			border-bottom: 2px solid #e5e7eb;
			padding-bottom: 0.3em;
			color: #111827;
		}

		.prose h2 {
			font-size: 1.8em;
			line-height: 1.3;
			margin-top: 2em;
			margin-bottom: 1em;
			border-bottom: 1px solid #f3f4f6;
			padding-bottom: 0.2em;
			color: #1f2937;
		}

		.prose h3 {
			font-size: 1.4em;
			margin-top: 1.6em;
			margin-bottom: 0.6em;
			color: #374151;
		}

		/* Lists */
		.prose ul {
			list-style-type: disc;
			padding-left: 1.5em;
		}

		.prose ol {
			list-style-type: decimal;
			padding-left: 1.5em;
		}

		.prose li {
			margin-top: 0.5em;
			margin-bottom: 0.5em;
			padding-left: 0.25em;
		}

		.prose li>p {
			margin-top: 0.5em;
			margin-bottom: 0.5em;
		}

		/* Blockquotes */
		.prose blockquote {
			border-left: 4px solid #e5e7eb;
			padding-left: 1.25em;
			font-style: italic;
			color: #6b7280;
		}

		/* Code Handling */
		.prose :not(pre)>code {
			background-color: #f3f4f6;
			padding: 0.2em 0.4em;
			border-radius: 0.25rem;
			font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
			font-size: 0.85em;
			color: #ef4444;
			/* Distinctive inline code color */
		}

		.prose pre {
			background-color: rgb(31, 41, 55) !important;
			padding: 1.25rem !important;
			border-radius: 0.75rem;
			overflow-x: auto;
			box-shadow: inset 0 2px 4px 0 rgb(0, 0, 0);
		}

		.prose pre code {
			background: transparent !important;
			padding: 0 !important;
			border-radius: 0 !important;
			font-size: 0.85em !important;
			line-height: 1.5 !important;
			color: #f9fafb !important;
			font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace !important;
		}

		/* Tables */
		.prose table {
			width: 100%;
			border-collapse: collapse;
			font-size: 0.9em;
			display: block;
			overflow-x: auto;
			-webkit-overflow-scrolling: touch;
		}

		.prose th {
			background-color: #f9fafb;
			text-align: left;
		}

		.prose th,
		.prose td {
			border: 1px solid #e5e7eb;
			padding: 0.75em;
		}

		/* Responsive Media */
		.prose img,
		.prose video,
		.prose iframe {
			max-width: 100%;
			height: auto;
			border-radius: 0.5rem;
		}

		@media (prefers-color-scheme: dark) {
			body {
				background-color: #020617;
				color: #f1f5f9;
			}

			.sidebar {
				background-color: #0f172a;
				border-color: #1e293b;
			}

			.prose {
				color: #cbd5e1;
			}

			.prose h1 {
				color: #f8fafc;
				border-color: #1e293b;
			}

			.prose h2 {
				color: #f1f5f9;
				border-color: #1e293b;
			}

			.prose h3 {
				color: #e2e8f0;
			}

			.prose :not(pre)>code {
				background-color: #1e293b;
				color: #fb7185;
			}

			.prose blockquote {
				border-color: #334155;
				color: #94a3b8;
			}

			.prose th {
				background-color: #1e293b;
			}

			.prose th,
			.prose td {
				border-color: #334155;
			}

			.file-item:hover {
				background-color: #1e293b;
			}
		}

		.file-item.active {
			background-color: #2563eb !important;
			color: white !important;
		}

		.mobile-sidebar-active #sidebar {
			display: flex !important;
			position: fixed;
			inset: 0;
			z-index: 60;
			width: 100%;
		}

		/* Ensure editor fills container and scrolls correctly */
		#editor-container {
			min-height: 0;
			display: flex;
			flex-direction: column;
			transition: all 0.3s ease;
		}

		#editor-container.hidden {
			display: none !important;
		}

		#content {
			transition: all 0.3s ease;
		}


		#editor {
			flex: 1;
			min-height: 0;
		}

		.cm-editor {
			height: 100% !important;
		}

		.cm-scroller {
			overflow: auto !important;
		}

		.no-scrollbar::-webkit-scrollbar {
			display: none;
		}

		.no-scrollbar {
			-ms-overflow-style: none;
			scrollbar-width: none;
		}

		/* Transitions for smoother UX */
		.transition-all {
			transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
		}
	</style>
</head>

<body class="h-screen flex flex-col overflow-hidden transition-colors duration-200">
	<header class="border-b border-gray-200 dark:border-gray-800 bg-white dark:bg-slate-950 z-50 shadow-sm shrink-0">
		<!-- Top Row: Logo and Primary Actions -->
		<div class="px-4 py-3 flex items-center justify-between">
			<div class="flex items-center gap-2">
				<a href="index.html"
					class="p-1.5 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg text-gray-500 mr-1" title="Home">
					<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
						<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
							d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6">
						</path>
					</svg>
				</a>
				<div class="bg-gradient-to-br from-blue-600 to-indigo-700 p-1.5 rounded-lg shadow-sm">
					<svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
						<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
							d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
						</path>
					</svg>
				</div>
				<h1 class="text-sm font-bold uppercase tracking-tight sm:text-lg sm:normal-case">MD Explorer</h1>
			</div>

			<div class="flex items-center gap-2">
				<input type="file" id="file-input" multiple accept=".md,.markdown,text/markdown" class="hidden" />
				<button id="open-btn"
					class="bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white px-3 py-1.5 sm:px-4 sm:py-2 rounded-lg text-xs sm:text-sm font-semibold transition-all transform active:scale-95 flex items-center gap-2 shadow-sm hover:shadow-md">
					<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
						<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
					</svg>
					<span id="btn-text">Open</span>
				</button>
				<button id="download-btn"
					class="bg-gradient-to-r from-green-600 to-green-700 hover:from-green-700 hover:to-green-800 text-white px-3 py-1.5 sm:px-4 sm:py-2 rounded-lg text-xs sm:text-sm font-semibold transition-all transform active:scale-95 flex items-center gap-2 shadow-sm hover:shadow-md">
					<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
						<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
							d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
					</svg>
					<span>Save</span>
				</button>
			</div>
		</div>

		<!-- Bottom Row: Secondary Toolbar (Responsive) -->
		<div
			class="px-4 py-2 border-t border-gray-100 dark:border-gray-900 bg-gray-50/50 dark:bg-slate-900/50 flex items-center justify-between sm:justify-end gap-3 overflow-x-auto no-scrollbar">
			<div
				class="flex items-center border border-gray-200 dark:border-gray-700 rounded-md overflow-hidden bg-white dark:bg-gray-900 shrink-0">
				<button onclick="changeZoom(-0.1)"
					class="px-2 py-1 hover:bg-gray-100 dark:hover:bg-gray-800 border-r border-gray-200 dark:border-gray-700 transition-colors">−</button>
				<span id="zoom-level" class="px-2 text-[10px] font-mono min-w-[2.5rem] text-center">100%</span>
				<button onclick="changeZoom(0.1)"
					class="px-2 py-1 hover:bg-gray-100 dark:hover:bg-gray-800 border-l border-gray-200 dark:border-gray-700 transition-colors">+</button>
				<button onclick="toggleWrap()" id="wrap-toggle-btn" title="Toggle Line Wrap"
					class="px-2 py-1 hover:bg-gray-100 dark:hover:bg-gray-800 border-l border-gray-200 dark:border-gray-700 transition-colors text-[10px] font-bold">W</button>
			</div>

			<div id="edit-controls" class="flex items-center gap-2 shrink-0">
				<button id="toggle-edit-btn"
					class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-800 px-3 py-1.5 rounded-lg text-xs transition flex items-center gap-2">
					<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
						<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
							d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z">
						</path>
					</svg>
					<span id="toggle-text">View</span>
				</button>
			</div>
		</div>
	</header>

	<div class="flex-1 flex overflow-hidden">
		<aside id="sidebar"
			class="w-72 border-r border-gray-200 dark:border-gray-800 flex flex-col shrink-0 sidebar hidden md:flex bg-white dark:bg-slate-900">
			<!-- Documents Panel -->
			<div id="documents-panel" class="flex flex-col overflow-hidden h-[40%]">
				<div
					class="p-4 border-b border-gray-100 dark:border-gray-800 flex justify-between items-center bg-white dark:bg-slate-900 z-10">
					<h2 class="text-xs text-gray-400 uppercase tracking-widest">Documents</h2>
					<button id="close-sidebar" class="md:hidden text-gray-500 p-1">
						<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
							<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
								d="M6 18L18 6M6 6l12 12">
							</path>
						</svg>
					</button>
				</div>
				<div id="file-list" class="flex-1 overflow-y-auto p-2 space-y-1">
					<div class="text-gray-400 text-xs italic p-8 text-center">Open files to begin.</div>
				</div>
			</div>

			<!-- Divider -->
			<div id="sidebar-resizer"
				class="h-1.5 bg-gray-50 dark:bg-slate-800 cursor-ns-resize hover:bg-blue-500/50 transition-colors border-y border-gray-200 dark:border-gray-700 shrink-0">
			</div>

			<!-- Outline Panel -->
			<div id="outline-panel" class="flex-1 flex flex-col overflow-hidden">
				<div class="p-4 border-b border-gray-100 dark:border-gray-800 bg-white dark:bg-slate-900 z-10">
					<h2 class="text-xs text-gray-400 uppercase tracking-widest">Outline</h2>
				</div>
				<div id="outline-list" class="flex-1 overflow-y-auto p-2 space-y-1 no-scrollbar">
					<div class="text-gray-400 text-xs italic p-8 text-center">Select a document.</div>
				</div>
			</div>
		</aside>

		<main class="flex-1 overflow-hidden bg-slate-50 dark:bg-black relative">
			<div id="editor-container" class="w-full h-full bg-white dark:bg-gray-950 px-4 py-8">
				<div id="editor" class="h-full border border-gray-200 dark:border-gray-800 rounded-lg overflow-hidden">
				</div>
			</div>
			<article id="content"
				class="prose dark:prose-invert hidden bg-white dark:bg-gray-950 p-4 sm:p-8 md:p-16 h-full border-x border-transparent sm:border-gray-100 dark:sm:border-gray-900 shadow-sm overflow-y-auto overflow-x-hidden w-full">
			</article>
		</main>
	</div>

	<button id="mobile-menu"
		class="fixed bottom-6 right-6 md:hidden bg-blue-600 text-white p-4 rounded-full shadow-2xl z-50">
		<svg id="menu-icon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
			<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
		</svg>
	</button>

	<script src="vendor/cm-md-bundle.js"></script>
	<script>
		const { EditorView, basicSetup, markdown, oneDark } = window.CM_MD;

		const openBtn = document.getElementById("open-btn");
		const fileInput = document.getElementById("file-input");
		const fileListContainer = document.getElementById("file-list");
		const contentArea = document.getElementById("content");
		const editorContainer = document.getElementById("editor-container");
		const editorEl = document.getElementById("editor");
		const emptyState = document.getElementById("empty-state");
		const sidebar = document.getElementById("sidebar");
		const mobileMenu = document.getElementById("mobile-menu");
		const closeSidebar = document.getElementById("close-sidebar");
		const zoomLabel = document.getElementById("zoom-level");
		const editControls = document.getElementById("edit-controls");
		const toggleEditBtn = document.getElementById("toggle-edit-btn");
		const toggleText = document.getElementById("toggle-text");
		const downloadBtn = document.getElementById("download-btn");

		let loadedFiles = new Map();
		let currentZoom = 1.0;
		let isEditing = true;
		let currentFileName = "Untitled.md";
		let editor = null;
		let lineWrap = true;
		const isFileSystemApiSupported = "showDirectoryPicker" in window;

		// Initialize CodeMirror
		function initEditor(initialValue = "") {
			if (editor) {
				editor.destroy();
			}

			const isDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
			const extensions = [
				basicSetup,
				markdown(),
				isDark ? oneDark : [],
				EditorView.theme({
					"&": { height: "100%", fontSize: "var(--reader-font-size)" },
					".cm-scroller": { overflow: "auto" }
				}),
				EditorView.updateListener.of((update) => {
					if (update.docChanged) {
						updatePreview();
					}
				})
			];

			if (lineWrap) {
				extensions.push(EditorView.lineWrapping);
			}

			editor = new EditorView({
				doc: initialValue,
				extensions: extensions,
				parent: editorEl
			});
		}

		function updatePreview() {
			if (editor) {
				const text = editor.state.doc.toString();
				contentArea.innerHTML = DOMPurify.sanitize(marked.parse(text));
				updateOutline();
				Prism.highlightAllUnder(contentArea);
			}
		}

		function updateOutline() {
			if (!editor) return;
			const text = editor.state.doc.toString();
			const outlineList = document.getElementById("outline-list");
			const headings = [];

			const lines = text.split("\n");
			lines.forEach((line, index) => {
				const match = line.match(/^(#{1,6})\s+(.+)$/);
				if (match) {
					headings.push({ level: match[1].length, text: match[2].trim(), line: index });
				}
			});

			if (headings.length === 0) {
				outlineList.innerHTML = '<div class="text-gray-400 text-xs italic p-8 text-center">No headings found.</div>';
				return;
			}

			outlineList.innerHTML = headings.map(h => `
				<button 
					onclick="scrollToHeading(${h.line}, '${h.text.replace(/'/g, "\\'")}')"
					class="w-full text-left px-3 py-1.5 rounded-md text-[11px] transition-all truncate hover:bg-gray-100 dark:hover:bg-slate-800 text-gray-600 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400"
					style="padding-left: ${h.level * 0.75}rem"
				>
					${h.text}
				</button>
			`).join("");
		}

		window.scrollToHeading = (line, originalText) => {
			if (isEditing && editor) {
				const pos = editor.state.doc.line(line + 1).from;
				editor.dispatch({
					selection: { anchor: pos, head: pos },
					scrollIntoView: true
				});
				editor.focus();
			} else {
				// Find heading in contentArea
				const headers = contentArea.querySelectorAll("h1, h2, h3, h4, h5, h6");
				for (const h of headers) {
					if (h.textContent.trim() === originalText) {
						h.scrollIntoView({ behavior: "smooth", block: "start" });
						break;
					}
				}
			}
		};

		window.toggleWrap = function () {
			lineWrap = !lineWrap;
			const btn = document.getElementById("wrap-toggle-btn");
			if (lineWrap) {
				btn.classList.add("bg-blue-600", "text-white", "border-blue-600");
				btn.classList.remove("hover:bg-gray-100", "dark:hover:bg-gray-800");
			} else {
				btn.classList.remove("bg-blue-600", "text-white", "border-blue-600");
				btn.classList.add("hover:bg-gray-100", "dark:hover:bg-gray-800");
			}
			if (editor) {
				const currentDoc = editor.state.doc.toString();
				initEditor(currentDoc);
			}
		};

		// Initialize wrap button state
		document.getElementById("wrap-toggle-btn").classList.add("bg-blue-600", "text-white", "border-blue-600");

		const toggleSidebar = () => {
			document.body.classList.toggle("mobile-sidebar-active");
			const isActive = document.body.classList.contains("mobile-sidebar-active");
			document.getElementById("menu-icon").innerHTML = isActive
				? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>'
				: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>';
		};

		mobileMenu.onclick = toggleSidebar;
		closeSidebar.onclick = toggleSidebar;

		if (isFileSystemApiSupported) {
			document.getElementById("btn-text").textContent = "Directory";
		}

		marked.setOptions({
			highlight: (code, lang) => {
				if (Prism.languages[lang]) {
					return Prism.highlight(code, Prism.languages[lang], lang);
				}
				return code;
			},
			breaks: true,
			gfm: true
		});

		window.changeZoom = function (delta) {
			currentZoom = Math.min(Math.max(0.5, currentZoom + delta), 2.5);
			document.documentElement.style.setProperty("--reader-font-size", `${currentZoom}rem`);
			zoomLabel.textContent = `${Math.round(currentZoom * 100)}%`;
		};

		async function handleFileSelect(files) {
			fileListContainer.innerHTML = "";
			loadedFiles.clear();
			Array.from(files).forEach((file) => {
				if (file.name.toLowerCase().endsWith(".md") || file.name.toLowerCase().endsWith(".markdown")) {
					loadedFiles.set(file.name, file);
					renderFileListItem(file.name);
				}
			});
			if (loadedFiles.size === 0) {
				fileListContainer.innerHTML = '<div class="p-4 text-center text-xs text-red-500">No Markdown files found.</div>';
			}
		}

		function renderFileListItem(name) {
			const btn = document.createElement("button");
			btn.className = "file-item w-full text-left px-3 py-3 rounded-lg text-sm transition-all flex items-center gap-3 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-slate-800";
			btn.innerHTML = `<svg class="w-4 h-4 shrink-0 opacity-40" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4a2 2 0 012-2h4.586A1 1 0 0111.293 2.707l2 2A1 1 0 0113.586 6H16a2 2 0 012 2v8a2 2 0 01-2 2H6a2 2 0 01-2-2V4z"></path></svg><span class="truncate">${name}</span>`;
			btn.onclick = () => displayFile(name, btn);
			fileListContainer.appendChild(btn);
		}

		async function displayFile(name, element) {
			const file = loadedFiles.get(name);
			const text = await (file.text ? file.text() : readFileAsText(file));
			currentFileName = name;

			document.querySelectorAll(".file-item").forEach((el) => el.classList.remove("active"));
			if (element) element.classList.add("active");

			// contentArea.innerHTML = DOMPurify.sanitize(marked.parse(text));

			// Initialize editor with current text
			initEditor(text);
			updatePreview();

			if (window.innerWidth < 1024) {
				isEditing = false;
				updateViewMode();
			}

			if (window.innerWidth < 768 && document.body.classList.contains("mobile-sidebar-active")) toggleSidebar();
			// document.querySelector("main").scrollTop = 0;
		}

		function updateViewMode() {
			if (isEditing) {
				contentArea.classList.add("hidden");
				editorContainer.classList.remove("hidden");
				toggleText.textContent = "View";
				toggleEditBtn.classList.add("bg-blue-600", "text-white", "border-blue-600");
				toggleEditBtn.classList.remove("bg-white", "dark:bg-gray-900", "text-gray-700", "dark:text-gray-300");
			} else {
				contentArea.classList.remove("hidden");
				editorContainer.classList.add("hidden");
				toggleText.textContent = "Edit";
				toggleEditBtn.classList.remove("bg-blue-600", "text-white", "border-blue-600");
				toggleEditBtn.classList.add("bg-white", "dark:bg-gray-900", "text-gray-700", "dark:text-gray-300");
			}
			updatePreview();
		}

		toggleEditBtn.onclick = () => {
			isEditing = !isEditing;
			updateViewMode();
		};

		window.addEventListener('resize', updateViewMode);

		downloadBtn.onclick = () => {
			if (!editor || !currentFileName) return;
			const text = editor.state.doc.toString();
			const blob = new Blob([text], { type: "text/markdown" });
			const url = URL.createObjectURL(blob);
			const a = document.createElement("a");
			a.href = url;
			a.download = currentFileName;
			a.click();
			URL.revokeObjectURL(url);
		};

		function readFileAsText(file) {
			return new Promise((resolve) => {
				const reader = new FileReader();
				reader.onload = (e) => resolve(e.target.result);
				reader.readAsText(file);
			});
		}

		openBtn.onclick = async () => {
			if (isFileSystemApiSupported) {
				try {
					const dirHandle = await window.showDirectoryPicker();
					fileListContainer.innerHTML = "";
					loadedFiles.clear();
					for await (const entry of dirHandle.values()) {
						if (entry.kind === "file" && (entry.name.toLowerCase().endsWith(".md") || entry.name.toLowerCase().endsWith(".markdown"))) {
							const file = await entry.getFile();
							loadedFiles.set(entry.name, file);
							renderFileListItem(entry.name);
						}
					}
				} catch (e) {
					if (e.name !== "AbortError") console.error(e);
				}
			} else {
				fileInput.click();
			}
		};

		fileInput.onchange = (e) => handleFileSelect(e.target.files);

		// Divider Resizing Logic
		(function () {
			const resizer = document.getElementById("sidebar-resizer");
			const topPanel = document.getElementById("documents-panel");
			const sidebar = document.getElementById("sidebar");
			let isResizing = false;

			resizer.addEventListener("mousedown", (e) => {
				isResizing = true;
				document.body.style.cursor = "ns-resize";
				document.body.classList.add("select-none");
			});

			document.addEventListener("mousemove", (e) => {
				if (!isResizing) return;
				const sidebarRect = sidebar.getBoundingClientRect();
				const offsetY = e.clientY - sidebarRect.top;
				const percentage = (offsetY / sidebarRect.height) * 100;

				if (percentage > 20 && percentage < 80) {
					topPanel.style.height = `${percentage}%`;
				}
			});

			document.addEventListener("mouseup", () => {
				if (isResizing) {
					isResizing = false;
					document.body.style.cursor = "";
					document.body.classList.remove("select-none");
				}
			});
		})();

		// Initial setup
		initEditor("# Welcome to MD Explorer\n\nStart typing here...");
		updateViewMode();
	</script>
</body>

</html>
