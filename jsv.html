<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
	<title>JSON Viewer</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
		rel="stylesheet">
	<script src="https://cdn.tailwindcss.com"></script>
	<script>
		tailwind.config = {
			theme: {
				extend: {
					fontFamily: {
						sans: ['Inter', 'sans-serif'],
					},
				}
			}
		}
	</script>
	<script src="vendor/purify.min.js"></script>

	<style>
		:root {
			--reader-font-size: 0.9rem;
		}

		body {
			font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
		}

		.json-tree {
			font-family: inherit;
			line-height: 1.5;
		}

		.json-node {
			margin-left: 1.25rem;
			position: relative;
		}

		.json-toggle {
			position: absolute;
			left: -1.1rem;
			cursor: pointer;
			user-select: none;
			opacity: 0.5;
			transition: opacity 0.2s;
			padding: 2px;
		}

		.json-toggle:hover {
			opacity: 1;
		}

		.json-key {
			color: #7e22ce;
			/* Purple */
			font-weight: normal;
		}

		.json-value-string {
			color: #15803d;
			/* Green */
			white-space: pre-wrap;
			word-break: break-word;
		}

		.json-value-number {
			color: #1d4ed8;
			/* Blue */
		}

		.json-value-boolean {
			color: #a16207;
			/* Yellow/Brown */
		}

		.json-value-null {
			color: #64748b;
			/* Slate */
		}

		.json-meta {
			color: #94a3b8;
			font-size: 0.7rem;
			margin-left: 0.5rem;
			font-weight: normal;
			opacity: 0.8;
		}

		.dark .json-key {
			color: #c084fc;
		}

		.dark .json-value-string {
			color: #4ade80;
		}

		.dark .json-value-number {
			color: #60a5fa;
		}

		.dark .json-value-boolean {
			color: #fbbf24;
		}

		.dark .json-value-null {
			color: #94a3b8;
		}

		.dark .json-meta {
			color: #475569;
		}

		.collapsed>.json-children {
			display: none;
		}

		.collapsed>.json-toggle::before {
			content: "▶";
		}

		.json-toggle::before {
			content: "▼";
			font-size: 0.7rem;
		}

		.expanded-only {
			display: none;
		}

		.json-node:not(.collapsed)>.expanded-only {
			display: block;
		}

		.json-node:not(.collapsed)>.json-node-content>.collapsed-only {
			display: none;
		}

		.json-node.collapsed>.expanded-only {
			display: none;
		}

		.json-node.collapsed>.json-node-content>.collapsed-only {
			display: inline;
		}

		.json-node-content {
			cursor: pointer;
			padding: 2px 4px;
			border-radius: 4px;
			transition: background 0.2s;
			display: inline-block;
			vertical-align: top;
		}

		.json-node-content:hover {
			background: rgba(0, 0, 0, 0.05);
		}

		.dark .json-node-content:hover {
			background: rgba(255, 255, 255, 0.1);
		}

		.copy-toast {
			position: fixed;
			bottom: 2rem;
			left: 50%;
			transform: translateX(-50%);
			background: #333;
			color: white;
			padding: 0.5rem 1rem;
			border-radius: 2rem;
			font-size: 0.8rem;
			z-index: 1000;
			opacity: 0;
			transition: opacity 0.3s;
			pointer-events: none;
		}

		@media (prefers-color-scheme: dark) {
			body {
				background-color: #020617;
				color: #f1f5f9;
			}

			.sidebar {
				background-color: #0f172a;
				border-color: #1e293b;
			}
		}

		/* Mobile specific improvements */
		@media (max-width: 640px) {
			:root {
				--reader-font-size: 0.85rem;
			}
		}

		.mobile-sidebar-active #sidebar {
			display: flex !important;
			position: fixed;
			inset: 0;
			z-index: 60;
			width: 100%;
		}

		/* Ensure editor fills container and scrolls correctly */
		#editor-container {
			min-height: 0;
			display: flex;
			flex-direction: column;
		}

		#editor {
			flex: 1;
			min-height: 0;
		}

		.cm-editor {
			height: 100% !important;
		}

		.cm-scroller {
			overflow: auto !important;
		}

		.file-item.active {
			background-color: #2563eb !important;
			color: white !important;
		}

		/* Hide scrollbars but allow scrolling */
		.no-scrollbar::-webkit-scrollbar {
			display: none;
		}

		.no-scrollbar {
			-ms-overflow-style: none;
			scrollbar-width: none;
		}
	</style>
</head>

<body class="h-screen flex flex-col overflow-hidden transition-colors duration-200">
	<header class="border-b border-gray-200 dark:border-gray-800 bg-white dark:bg-slate-950 z-50 shadow-sm shrink-0">
		<!-- Top Row: Logo and Primary Actions -->
		<div class="px-4 py-3 flex items-center justify-between">
			<div class="flex items-center gap-2">
				<a href="index.html"
					class="p-1.5 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg text-gray-500 mr-1" title="Home">
					<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
						<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
							d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6">
						</path>
					</svg>
				</a>
				<div class="bg-gradient-to-br from-yellow-500 to-orange-600 p-1.5 rounded-lg shadow-sm">
					<svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
						<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
							d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
					</svg>
				</div>
				<h1 class="text-sm font-bold uppercase tracking-tight sm:text-lg sm:normal-case">JS Explorer</h1>
			</div>

			<div class="flex items-center gap-2">
				<input type="file" id="file-input" multiple accept=".js,.json,.ts,.txt" class="hidden" />
				<button id="new-btn"
					class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 sm:px-4 sm:py-2 rounded-lg text-xs sm:text-sm font-semibold transition-all transform active:scale-95 flex items-center gap-2 shadow-sm hover:shadow-md">
					<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
						<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
					</svg>
					<span>New</span>
				</button>
				<button id="open-btn"
					class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-800 px-3 py-1.5 sm:px-4 sm:py-2 rounded-lg text-xs sm:text-sm font-semibold transition-all transform active:scale-95 flex items-center gap-2 shadow-sm hover:shadow-md">
					<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
						<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
							d="M4 12v.01M7 12v.01M10 12v.01M13 12v.01M16 12v.01M19 12v.01M4 15v.01M7 15v.01M10 15v.01M13 15v.01M16 15v.01M19 15v.01M4 18v.01M7 18v.01M10 18v.01M13 18v.01M16 18v.01M19 18v.01M4 9v.01M7 9v.01M10 9v.01M13 9v.01M16 9v.01M19 9v.01M4 6v.01M7 6v.01M10 6v.01M13 6v.01M16 6v.01M19 6v.01">
						</path>
					</svg>
					<span id="btn-text">Open</span>
				</button>
				<button id="download-btn"
					class="bg-gradient-to-r from-green-600 to-green-700 hover:from-green-700 hover:to-green-800 text-white px-3 py-1.5 sm:px-4 sm:py-2 rounded-lg text-xs sm:text-sm font-semibold transition-all transform active:scale-95 flex items-center gap-2 shadow-sm hover:shadow-md">
					<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
						<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
							d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
					</svg>
					<span>Save</span>
				</button>
			</div>
		</div>

		<!-- Bottom Row: Secondary Toolbar (Responsive) -->
		<div
			class="px-4 py-2 border-t border-gray-100 dark:border-gray-900 bg-gray-50/50 dark:bg-slate-900/50 flex items-center justify-between sm:justify-end gap-3 flex-wrap relative z-40">
			<div class="flex items-center gap-2 shrink-0">
				<div class="relative" id="dropdown-instance">
					<button id="instance-menu-btn"
						class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-800 px-3 py-1.5 rounded-lg text-xs transition flex items-center gap-2">
						<span id="instance-label">JSON 1</span>
						<svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
							<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7">
							</path>
						</svg>
					</button>
					<div id="instance-menu-dropdown"
						class="absolute left-0 sm:right-0 sm:left-auto mt-1 w-32 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-lg shadow-xl hidden z-[100]">
						<button onclick="switchInstance(0)"
							class="w-full text-left px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-800 text-xs instance-btn"
							data-instance="0">JSON 1</button>
						<button onclick="switchInstance(1)"
							class="w-full text-left px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-800 text-xs instance-btn"
							data-instance="1">JSON 2</button>
						<button onclick="switchInstance(2)"
							class="w-full text-left px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-800 text-xs instance-btn"
							data-instance="2">JSON 3</button>
					</div>
				</div>

				<button onclick="prettify()"
					class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-800 px-3 py-1.5 rounded-lg text-xs transition flex items-center">
					Format
				</button>
				<button onclick="toggleWrap()" id="wrap-toggle-btn"
					class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-800 px-3 py-1.5 rounded-lg text-xs transition flex items-center font-bold">
					W
				</button>
			</div>

			<div class="flex items-center gap-2 shrink-0">
				<button id="source-view-btn" onclick="revertToSource()"
					class="hidden bg-orange-100 dark:bg-orange-900/30 border border-orange-200 dark:border-orange-800 text-orange-700 dark:text-orange-300 hover:bg-orange-200 px-3 py-1.5 rounded-lg text-xs transition flex items-center">
					Source
				</button>
				<div class="relative" id="dropdown-tools">
					<button id="tools-menu-btn"
						class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-800 px-3 py-1.5 rounded-lg text-xs transition flex items-center gap-2">
						<span>Tools</span>
						<svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
							<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7">
							</path>
						</svg>
					</button>
					<div id="tools-menu-dropdown"
						class="absolute right-0 mt-1 w-48 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-lg shadow-xl hidden z-[100]">
						<button onclick="transform('cleanJSON')"
							class="w-full text-left px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-800 text-xs text-green-500">Fix/Clean
							JSON</button>
						<button onclick="transform('escapeJSON')"
							class="w-full text-left px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-800 text-xs text-blue-500">Escape
							JSON String</button>
						<button onclick="transform('unescapeJSON')"
							class="w-full text-left px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-800 text-xs text-blue-500">Unescape
							JSON String</button>
						<button onclick="transform('resolveNewlines')"
							class="w-full text-left px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-800 text-xs text-purple-500">Resolve
							Escapes (\n, \u)</button>
					</div>
				</div>
				<button id="toggle-view-btn"
					class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-800 px-3 py-1.5 rounded-lg text-xs transition flex items-center">
					<span id="toggle-text">Tree</span>
				</button>
			</div>
		</div>
	</header>

	<div class="flex-1 flex overflow-hidden relative">
		<aside id="sidebar"
			class="w-72 border-r border-gray-200 dark:border-gray-800 flex flex-col shrink-0 sidebar hidden md:flex bg-white dark:bg-slate-900">
			<!-- Documents Panel -->
			<div class="flex flex-col overflow-hidden h-full">
				<div
					class="p-4 border-b border-gray-100 dark:border-gray-800 flex justify-between items-center bg-white dark:bg-slate-900 z-10">
					<h2 class="text-xs text-gray-400 uppercase tracking-widest">Files</h2>
					<button id="close-sidebar" class="md:hidden text-gray-500 p-1">
						<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
							<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
								d="M6 18L18 6M6 6l12 12">
							</path>
						</svg>
					</button>
				</div>
				<div id="file-list" class="flex-1 overflow-y-auto p-2 space-y-1">
					<div class="text-gray-400 text-xs italic p-8 text-center">Open files to begin.</div>
				</div>
				<div class="p-3 border-t border-gray-100 dark:border-gray-800">
					<button id="new-btn-sidebar" onclick="createNewScratchpad()"
						class="w-full flex items-center justify-center gap-2 py-2 bg-slate-50 dark:bg-slate-800/50 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg text-xs font-medium transition-all">
						<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
							<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
						</svg>
						New Scratchpad
					</button>
				</div>
			</div>
		</aside>

		<main class="flex-1 overflow-hidden bg-slate-50 dark:bg-black relative flex flex-col">
			<div id="editor-container" class="flex-1 w-full bg-white dark:bg-gray-950 px-0 sm:px-4 py-2 sm:py-8">
				<div id="editor" class="h-full border-y sm:border border-gray-200 dark:border-gray-800 sm:rounded-lg overflow-hidden"></div>
			</div>
			<div id="tree-container"
				class="hidden flex-1 w-full bg-white dark:bg-gray-950 overflow-auto p-2 sm:p-8 md:p-16 font-mono text-sm border-x border-transparent sm:border-gray-100 dark:sm:border-gray-900 shadow-sm">
				<div id="json-tree-root" class="json-tree"></div>
			</div>
			<!-- Empty State removal or adjustment if needed, but mdv.html doesn't have it clearly -->
		</main>
	</div>

	<button id="mobile-menu"
		class="fixed bottom-6 right-6 md:hidden bg-blue-600 text-white p-4 rounded-full shadow-2xl z-50">
		<svg id="menu-icon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
			<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
		</svg>
	</button>

	<div id="copy-toast" class="copy-toast">Copied to clipboard!</div>

	<script src="vendor/cm-js-bundle.js"></script>
	<script>
		const { EditorView, basicSetup, javascript, json, oneDark, foldGutter, foldKeymap, keymap } = window.CM_JS;
		const fileListContainer = document.getElementById("file-list");
		const editorContainer = document.getElementById("editor-container");
		const treeContainer = document.getElementById("tree-container");
		const treeRoot = document.getElementById("json-tree-root");
		const editorEl = document.getElementById("editor");
		const toggleViewBtn = document.getElementById("toggle-view-btn");
		const toggleText = document.getElementById("toggle-text");
		const downloadBtn = document.getElementById("download-btn");
		const copyToast = document.getElementById("copy-toast");
		const sourceBtn = document.getElementById("source-view-btn");
		const sidebar = document.getElementById("sidebar");

		const openBtn = document.getElementById("open-btn");
		const newBtn = document.getElementById("new-btn");
		const fileInput = document.getElementById("file-input");
		const mobileMenu = document.getElementById("mobile-menu");
		const closeSidebar = document.getElementById("close-sidebar");

		const toggleSidebar = () => {
			document.body.classList.toggle("mobile-sidebar-active");
			const isActive = document.body.classList.contains("mobile-sidebar-active");
			document.getElementById("menu-icon").innerHTML = isActive
				? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>'
				: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>';
		};

		mobileMenu.onclick = toggleSidebar;
		closeSidebar.onclick = toggleSidebar;

		let loadedFiles = new Map();
		let currentFileName = null;
		let editor = null;
		let sourceJSON = null; // Store the original JSON when in resolved view
		let viewMode = "editor"; // 'editor' or 'tree'
		let lineWrap = true;

		// Dropdown handling
		const instanceDropdown = document.getElementById('instance-menu-dropdown');
		const instanceBtn = document.getElementById('instance-menu-btn');
		const toolsDropdown = document.getElementById('tools-menu-dropdown');
		const toolsBtn = document.getElementById('tools-menu-btn');

		instanceBtn.addEventListener('click', (e) => {
			e.stopPropagation();
			const isHidden = instanceDropdown.classList.contains('hidden');
			toolsDropdown.classList.add('hidden'); // Close the other dropdown
			if (isHidden) {
				instanceDropdown.classList.remove('hidden');
			} else {
				instanceDropdown.classList.add('hidden');
			}
		});

		toolsBtn.addEventListener('click', (e) => {
			e.stopPropagation();
			const isHidden = toolsDropdown.classList.contains('hidden');
			instanceDropdown.classList.add('hidden'); // Close the other dropdown
			if (isHidden) {
				toolsDropdown.classList.remove('hidden');
			} else {
				toolsDropdown.classList.add('hidden');
			}
		});

		window.addEventListener('click', (e) => {
			if (!e.target.closest('#dropdown-instance')) {
				instanceDropdown.classList.add('hidden');
			}
			if (!e.target.closest('#dropdown-tools')) {
				toolsDropdown.classList.add('hidden');
			}
		});
		let currentInstance = 0;
		let instances = [
			{ content: "", fileName: "scratchpad-1.json" },
			{ content: "", fileName: "scratchpad-2.json" },
			{ content: "", fileName: "scratchpad-3.json" }
		];

		// Initialize CodeMirror
		function initEditor(initialValue = "", language = "javascript", readOnly = false) {
			if (editor) editor.destroy();
			const isDark = window.matchMedia("(prefers-color-scheme: dark)").matches;

			const extensions = [
				basicSetup,
				language === "json" ? json() : javascript(),
				isDark ? oneDark : [],
				foldGutter(),
				keymap.of(foldKeymap),
				EditorView.editable.of(!readOnly),
				EditorView.theme({
					"&": { height: "100%", fontSize: "13px" },
					".cm-scroller": { overflow: "auto" }
				})
			];

			if (lineWrap) {
				extensions.push(EditorView.lineWrapping);
			}

			editor = new EditorView({
				doc: initialValue,
				extensions: extensions,
				parent: editorEl
			});

			if (!readOnly) {
				setTimeout(() => editor.focus(), 10);
			}
		}

		window.revertToSource = function () {
			if (sourceJSON !== null) {
				initEditor(sourceJSON, currentFileName?.endsWith(".json") ? "json" : "javascript", false);
				sourceJSON = null;
				sourceBtn.classList.add("hidden");
			}
		};

		window.toggleWrap = function () {
			lineWrap = !lineWrap;
			const btn = document.getElementById("wrap-toggle-btn");
			if (lineWrap) {
				btn.classList.add("bg-blue-100", "dark:bg-blue-900/30", "text-blue-700", "dark:text-blue-300");
			} else {
				btn.classList.remove("bg-blue-100", "dark:bg-blue-900/30", "text-blue-700", "dark:text-blue-300");
			}
			if (editor) {
				const currentDoc = editor.state.doc.toString();
				instances[currentInstance].content = currentDoc;
				initEditor(currentDoc, currentFileName?.endsWith(".json") ? "json" : "javascript");
			}
		};

		window.switchInstance = function (index) {
			if (index === currentInstance) return;

			// Save current instance content
			if (editor) {
				instances[currentInstance].content = editor.state.doc.toString();
				instances[currentInstance].fileName = currentFileName;
			}

			// Switch to new instance
			currentInstance = index;
			currentFileName = instances[index].fileName;
			sourceJSON = null;
			sourceBtn.classList.add("hidden");

			// Update UI
			document.getElementById("instance-label").textContent = `JSON ${index + 1}`;
			document.querySelectorAll(".instance-btn").forEach(btn => {
				btn.classList.remove("bg-blue-100", "dark:bg-blue-900/30");
				if (parseInt(btn.dataset.instance) === index) {
					btn.classList.add("bg-blue-100", "dark:bg-blue-900/30");
				}
			});

			// Update file list selection
			document.querySelectorAll(".file-item").forEach(el => el.classList.remove("active", "bg-blue-100", "dark:bg-blue-900/30"));

			// Load new instance content
			const isJson = currentFileName.toLowerCase().endsWith(".json");
			initEditor(instances[index].content, isJson ? "json" : "javascript");

			if (isJson || instances[index].content.trim().startsWith("{") || instances[index].content.trim().startsWith("[")) {
				buildTree(instances[index].content);
			} else {
				treeRoot.innerHTML = '<div class="text-gray-400 p-8 text-center italic">Not currently showing tree for non-JSON content.</div>';
			}
		};

		// Initialize wrap button state
		document.getElementById("wrap-toggle-btn").classList.add("bg-blue-100", "dark:bg-blue-900/30", "text-blue-700", "dark:text-blue-300");

		async function handleFileSelect(files) {
			fileListContainer.innerHTML = "";
			loadedFiles.clear();
			Array.from(files).forEach((file) => {
				loadedFiles.set(file.name, file);
				renderFileListItem(file.name);
			});
			if (loadedFiles.size > 0) {
				const first = Array.from(loadedFiles.keys())[0];
				displayFile(first);
			}
		}

		function renderFileListItem(name) {
			const btn = document.createElement("button");
			btn.className = "file-item w-full text-left px-3 py-2 rounded-lg text-xs font-medium transition-all truncate text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-slate-800";
			btn.textContent = name;
			btn.onclick = () => displayFile(name, btn);
			fileListContainer.appendChild(btn);
		}

		async function displayFile(name, element) {
			const file = loadedFiles.get(name);
			const text = await (file.text ? file.text() : readFileAsText(file));
			currentFileName = name;
			sourceJSON = null; // Reset sourceJSON when a new file is displayed
			sourceBtn.classList.add("hidden"); // Hide source button

			// Save to current instance
			instances[currentInstance].content = text;
			instances[currentInstance].fileName = name;

			document.querySelectorAll(".file-item").forEach((el) => el.classList.remove("active", "bg-blue-100", "dark:bg-blue-900/30"));
			if (element) element.classList.add("active", "bg-blue-100", "dark:bg-blue-900/30");

			if (window.innerWidth < 768 && document.body.classList.contains("mobile-sidebar-active")) toggleSidebar();

			const isJson = name.toLowerCase().endsWith(".json");
			initEditor(text, isJson ? "json" : "javascript");

			if (isJson || text.trim().startsWith("{") || text.trim().startsWith("[")) {
				buildTree(text);
			} else {
				treeRoot.innerHTML = '<div class="text-gray-400 p-8 text-center italic">Not currently showing tree for non-JSON content.</div>';
			}
		}

		function safeJsonParse(text) {
			try {
				return JSON.parse(text);
			} catch (e) {
				// If it fails, try to "fix" common issues
				try {
					const cleaned = performSophisticatedClean(text);
					return JSON.parse(cleaned);
				} catch (e2) {
					throw e; // throw original error if fix fails
				}
			}
		}

		function performSophisticatedClean(text) {
			let cleaned = text.trim();

			// 1. Remove JavaScript-style comments
			cleaned = cleaned.replace(/\/\*[\s\S]*?\*\/|([^:]|^)\/\/.*$/gm, '$1');

			// 2. Normalize single quotes to double quotes, escaping existing double quotes
			cleaned = cleaned.replace(/'([^'\\]*(?:\\.[^'\\]*)*)'/g, (match, p1) => {
				return '"' + p1.replace(/"/g, '\\"') + '"';
			});

			// 3. Fix missing quotes on keys (simple version)
			cleaned = cleaned.replace(/([{,]\s*)([a-zA-Z0-9_$]+)\s*:/g, '$1"$2":');

			// 4. Handle escaped quotes that might be broken
			cleaned = cleaned.replace(/\\'/g, "'");

			// 5. Remove trailing commas
			cleaned = cleaned.replace(/,\s*([\]}])/g, "$1");

			// 6. Handle literal newlines in strings
			cleaned = cleaned.replace(/:\s*"(.*?)"/gs, (match, p1) => {
				return `: "${p1.replace(/\n/g, "\\n").replace(/\r/g, "\\r")}"`;
			});

			return cleaned;
		}

		function buildTree(text) {
			treeRoot.innerHTML = "";
			try {
				const data = safeJsonParse(text);
				treeRoot.appendChild(renderNode(null, data, true));
			} catch (e) {
				treeRoot.innerHTML = `<div class="text-red-500 p-4 border border-red-200 rounded-lg">
                    <div class="mb-1">Invalid JSON for Tree View:</div>
                    <div class="text-xs font-mono opacity-70">${e.message}</div>
                    <button onclick="transform('cleanJSON')" class="mt-4 px-3 py-1 bg-red-100 hover:bg-red-200 text-red-700 rounded text-xs transition">Try to Auto-Fix JSON</button>
                </div>`;
			}
		}

		function renderNode(key, value, isLast = true, index = null) {
			const node = document.createElement("div");
			node.className = "json-node collapsed";

			const content = document.createElement("span");
			content.className = "json-node-content";

			if (index !== null) {
				const indexSpan = document.createElement("span");
				indexSpan.className = "text-gray-400 mr-2 opacity-50";
				indexSpan.textContent = `[${index}]`;
				content.appendChild(indexSpan);
			}

			if (key !== null) {
				const keySpan = document.createElement("span");
				keySpan.className = "json-key";
				keySpan.textContent = `"${key}": `;
				content.appendChild(keySpan);
			}

			const isObject = value !== null && typeof value === "object";

			if (isObject) {
				const isArray = Array.isArray(value);
				const openBracket = isArray ? "[" : "{";
				const closeBracket = isArray ? "]" : "}";
				const count = isArray ? value.length : Object.keys(value).length;

				const label = document.createElement("span");
				label.textContent = openBracket;
				content.appendChild(label);

				// Ellipsis for collapsed view
				const ellipsis = document.createElement("span");
				ellipsis.className = "collapsed-only text-gray-400 mx-1";
				ellipsis.textContent = "...";
				content.appendChild(ellipsis);

				const closeLabel = document.createElement("span");
				closeLabel.className = "collapsed-only";
				closeLabel.textContent = closeBracket + (isLast ? "" : ",");
				content.appendChild(closeLabel);

				const meta = document.createElement("span");
				meta.className = "json-meta";
				meta.textContent = `${count} ${isArray ? "item" : "field"}${count !== 1 ? "s" : ""}`;
				content.appendChild(meta);

				const toggle = document.createElement("div");
				toggle.className = "json-toggle";
				toggle.onclick = (e) => {
					e.stopPropagation();
					node.classList.toggle("collapsed");
				};
				node.appendChild(toggle);

				const children = document.createElement("div");
				children.className = "json-children";

				const keys = Object.keys(value);
				keys.forEach((k, i) => {
					children.appendChild(renderNode(isArray ? null : k, value[k], i === keys.length - 1, isArray ? i : null));
				});
				node.appendChild(content);
				node.appendChild(children);

				const footer = document.createElement("div");
				footer.className = "expanded-only opacity-70";
				footer.style.marginLeft = "0";
				footer.textContent = closeBracket + (isLast ? "" : ",");
				node.appendChild(footer);
			} else {
				const valSpan = document.createElement("span");
				const type = value === null ? "null" : typeof value;
				valSpan.className = `json-value-${type}`;
				valSpan.textContent = type === "string" ? `"${value}"` : String(value);
				content.appendChild(valSpan);

				if (type === "string") {
					const meta = document.createElement("span");
					meta.className = "json-meta opacity-40";
					meta.textContent = `${value.length} ch`;
					content.appendChild(meta);
				}

				if (!isLast) content.appendChild(document.createTextNode(","));
				node.appendChild(content);
			}

			content.onclick = (e) => {
				e.stopPropagation();
				copyToClipboard(isObject ? JSON.stringify(value, null, 2) : String(value));
			};

			return node;
		}

		function copyToClipboard(text) {
			navigator.clipboard.writeText(text).then(() => {
				copyToast.style.opacity = "1";
				setTimeout(() => (copyToast.style.opacity = "0"), 2000);
			});
		}

		window.prettify = () => {
			if (!editor) return;
			try {
				const content = editor.state.doc.toString();
				const parsed = safeJsonParse(content);
				const formatted = JSON.stringify(parsed, null, 2);
				editor.dispatch({
					changes: { from: 0, to: editor.state.doc.length, insert: formatted }
				});
				instances[currentInstance].content = formatted;
				buildTree(formatted);
			} catch (e) {
				alert("Only valid JSON (or almost valid JSON) can be prettified.");
			}
		};

		window.transform = (type) => {
			if (!editor) return;
			const content = editor.state.doc.toString();
			let result = "";
			try {
				if (type === "escapeJSON") {
					// If it's already wrapped in quotes and seems like a JSON string, don't double escape
					if (content.startsWith('"') && content.endsWith('"') && !content.includes("\n")) {
						result = content;
					} else {
						result = JSON.stringify(content);
					}
				} else if (type === "unescapeJSON") {
					try {
						// Attempt to parse as a full JSON string first
						const parsed = JSON.parse(content);
						result = typeof parsed === "string" ? parsed : content;
					} catch (e) {
						// If it's just the inner content of a string, try wrapping it
						try {
							result = JSON.parse(`"${content}"`);
						} catch (e2) {
							result = content;
						}
					}
				} else if (type === "resolveNewlines") {
					sourceJSON = content; // Save the original
					result = content.replace(/\\n/g, "\n")
						.replace(/\\r/g, "\r")
						.replace(/\\t/g, "\t")
						.replace(/\\"/g, '"')
						.replace(/\\u([0-9a-fA-F]{4})/g, (match, grp) => {
							return String.fromCharCode(parseInt(grp, 16));
						});
					initEditor(result, "javascript", true); // Show in editor, read-only
					sourceBtn.classList.remove("hidden");
					return;
				} else if (type === "cleanJSON") {
					try {
						const cleaned = performSophisticatedClean(content);
						const parsed = JSON.parse(cleaned);
						result = JSON.stringify(parsed, null, 2);
					} catch (e) {
						// Final fallback attempt if performSophisticatedClean + JSON.parse fails
						result = content.replace(/\\n/g, "\n").replace(/\\"/g, '"');
					}
				}

				editor.dispatch({
					changes: { from: 0, to: editor.state.doc.length, insert: result }
				});
				instances[currentInstance].content = result;
				if (type === "cleanJSON") buildTree(result || editor.state.doc.toString());
			} catch (e) {
				alert("Transformation failed: " + e.message);
			}
		};

		window.showPreview = (content) => {
			// Legacy function, no longer used as we show in main editor
		};

		window.closePreview = () => {
			// Legacy function
		};

		window.copyResolved = () => {
			// Legacy function
		};

		toggleViewBtn.onclick = () => {
			if (viewMode === "editor") {
				viewMode = "tree";
				editorContainer.classList.add("hidden");
				treeContainer.classList.remove("hidden");
				toggleText.textContent = "Editor";
				toggleViewBtn.classList.add("bg-blue-600", "text-white", "border-blue-600");
				toggleViewBtn.classList.remove("bg-white", "dark:bg-gray-900", "text-gray-700", "dark:text-gray-300");
				const contentToParse = sourceJSON !== null ? sourceJSON : editor.state.doc.toString();
				buildTree(contentToParse);
			} else {
				viewMode = "editor";
				editorContainer.classList.remove("hidden");
				treeContainer.classList.add("hidden");
				toggleText.textContent = "Tree";
				toggleViewBtn.classList.remove("bg-blue-600", "text-white", "border-blue-600");
				toggleViewBtn.classList.add("bg-white", "dark:bg-gray-900", "text-gray-700", "dark:text-gray-300");
			}
		};

		downloadBtn.onclick = () => {
			if (!editor || !currentFileName) return;
			const text = sourceJSON !== null ? sourceJSON : editor.state.doc.toString();
			const blob = new Blob([text], { type: "application/javascript" });
			const url = URL.createObjectURL(blob);
			const a = document.createElement("a");
			a.href = url;
			a.download = currentFileName;
			a.click();
			URL.revokeObjectURL(url);
		};

		function readFileAsText(file) {
			return new Promise((resolve) => {
				const reader = new FileReader();
				reader.onload = (e) => resolve(e.target.result);
				reader.readAsText(file);
			});
		}

		openBtn.onclick = () => fileInput.click();

		window.createNewScratchpad = function () {
			// Save current content before creating new
			if (editor) {
				instances[currentInstance].content = editor.state.doc.toString();
			}
			currentFileName = "scratchpad.json";
			instances[currentInstance].fileName = "scratchpad.json";
			instances[currentInstance].content = "{\n  \n}";
			initEditor("{\n  \n}", "json");
			if (window.innerWidth < 768 && document.body.classList.contains("mobile-sidebar-active")) toggleSidebar();
		};

		newBtn.onclick = createNewScratchpad;
		fileInput.onchange = (e) => handleFileSelect(e.target.files);

		// Initialize
		(function init() {
			// Default to a new scratchpad
			createNewScratchpad();
		})();
	</script>
</body>
